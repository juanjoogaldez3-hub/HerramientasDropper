<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herramientas Dropper — Ingreso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabaseClient.js"></script>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-head">
      <div class="wordmark">Dropper<span class="dot">.</span></div>
      <div class="tag">Herramientas · Smart Delivery</div>
    </div>
    <div class="auth-body">
      <h1 id="form-title">Ingresá a tu cuenta</h1>
      <p class="sub" id="form-sub">Acceso para el equipo de Dropper.</p>

      <div class="auth-msg" id="msg"></div>

      <form id="auth-form">
        <div class="field">
          <label for="email">Correo</label>
          <input type="email" id="email" autocomplete="email" placeholder="tu@dropper.gt" required>
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn">Ingresar</button>
      </form>

      <div class="auth-foot">
        Acceso solo para el equipo de Dropper.
      </div>
      <div style="display:none">
        <span id="toggle-text"></span>
        <a href="#" id="toggle-mode"></a>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const sb = window.sb;
  const $ = s => document.querySelector(s);
  const params = new URLSearchParams(location.search);
  const next = params.get("next") || "inicio.html";
  let mode = "signin"; // o "signup"

  function showMsg(text, type){
    const m = $("#msg"); m.textContent = text;
    m.className = "auth-msg show " + (type||"");
  }
  function clearMsg(){ $("#msg").className = "auth-msg"; }

  // Sin configurar Supabase → avisar y bloquear el formulario.
  if(!sb){
    showMsg("Supabase aún no está configurado. Pegá tus llaves en assets/js/config.js (ver README).", "err");
    $("#auth-form").querySelectorAll("input,button").forEach(el=>el.disabled=true);
    $("#toggle-mode").style.pointerEvents="none";
    $("#toggle-mode").style.opacity=".5";
    return;
  }

  // Si ya hay sesión, entrar directo.
  sb.auth.getUser().then(({data})=>{ if(data && data.user) location.replace(next); });

  $("#toggle-mode").addEventListener("click", e=>{
    e.preventDefault();
    clearMsg();
    if(mode==="signin"){
      mode="signup";
      $("#form-title").textContent="Creá tu cuenta";
      $("#form-sub").textContent="Registrá una cuenta del equipo de Dropper.";
      $("#submit-btn").textContent="Crear cuenta";
      $("#password").autocomplete="new-password";
      $("#toggle-text").textContent="¿Ya tenés cuenta? ";
      $("#toggle-mode").textContent="Ingresar";
    }else{
      mode="signin";
      $("#form-title").textContent="Ingresá a tu cuenta";
      $("#form-sub").textContent="Acceso para el equipo de Dropper.";
      $("#submit-btn").textContent="Ingresar";
      $("#password").autocomplete="current-password";
      $("#toggle-text").textContent="¿Primera vez? ";
      $("#toggle-mode").textContent="Crear cuenta";
    }
  });

  $("#auth-form").addEventListener("submit", async e=>{
    e.preventDefault();
    clearMsg();
    const email = $("#email").value.trim();
    const password = $("#password").value;
    const btn = $("#submit-btn");
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = mode==="signup" ? "Creando…" : "Ingresando…";
    try{
      if(mode==="signup"){
        const { error } = await sb.auth.signUp({ email, password });
        if(error) throw error;
        showMsg("Cuenta creada. Si Supabase pide confirmar el correo, revisá tu bandeja; si no, ya podés ingresar.", "ok");
        // Algunos proyectos requieren confirmación por email; si no, hay sesión activa.
        const { data } = await sb.auth.getUser();
        if(data && data.user) location.replace(next);
      }else{
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if(error) throw error;
        location.replace(next);
      }
    }catch(err){
      const map = {
        "Invalid login credentials":"Correo o contraseña incorrectos.",
        "User already registered":"Ese correo ya tiene cuenta. Probá ingresar.",
        "Email not confirmed":"Falta confirmar el correo. Revisá tu bandeja de entrada.",
      };
      showMsg(map[err.message] || ("No se pudo continuar: " + err.message), "err");
    }finally{
      btn.disabled = false;
      btn.textContent = original;
    }
  });
})();
</script>
</body>
</html>
